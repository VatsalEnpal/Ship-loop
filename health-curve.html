<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
  }
  .container {
    width: 720px;
    padding: 48px;
  }
  .title {
    color: #e5e5e5;
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .subtitle {
    color: #666;
    font-size: 13px;
    margin-bottom: 32px;
  }
  svg { display: block; }
  .axis-label {
    fill: #666;
    font-size: 11px;
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
  }
  .score-label {
    fill: #e5e5e5;
    font-size: 12px;
    font-weight: 500;
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
  }
  .cycle-label {
    fill: #666;
    font-size: 11px;
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
  }
  .footer {
    color: #333;
    font-size: 11px;
    margin-top: 24px;
    text-align: right;
  }
  .footer span { color: #3b82f6; }
</style>
</head>
<body>
<div class="container">
  <div class="title">Good morning. Here's your run from last night.</div>
  <div class="subtitle">Product ready at .shiploop/spec-to-ship.md — 6 cycles, 35 issues found, 15 fixed</div>

  <svg width="624" height="320" viewBox="0 0 624 320">
    <!-- Grid lines -->
    <line x1="40" y1="20" x2="40" y2="260" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="40" y1="260" x2="600" y2="260" stroke="#1a1a1a" stroke-width="1"/>

    <!-- Horizontal grid lines with labels -->
    <line x1="40" y1="236" x2="600" y2="236" stroke="#111" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="30" y="240" text-anchor="end" class="axis-label">70</text>

    <line x1="40" y1="188" x2="600" y2="188" stroke="#111" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="30" y="192" text-anchor="end" class="axis-label">80</text>

    <line x1="40" y1="140" x2="600" y2="140" stroke="#111" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="30" y="144" text-anchor="end" class="axis-label">90</text>

    <line x1="40" y1="92" x2="600" y2="92" stroke="#111" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="30" y="96" text-anchor="end" class="axis-label">95</text>

    <line x1="40" y1="44" x2="600" y2="44" stroke="#111" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="30" y="48" text-anchor="end" class="axis-label">100</text>

    <!-- Ship threshold line -->
    <line x1="40" y1="92" x2="600" y2="92" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3"/>
    <text x="604" y="96" class="axis-label" fill="#3b82f6" font-size="10">ship</text>

    <!-- Area fill under curve -->
    <path d="M 80 216 C 130 216, 155 176, 180 172 C 205 168, 230 128, 280 124 C 330 120, 345 100, 380 96 C 415 92, 430 68, 480 60 C 530 52, 540 48, 568 46 L 568 260 L 80 260 Z"
          fill="url(#gradient)" opacity="0.15"/>

    <!-- Gradient definition -->
    <defs>
      <linearGradient id="gradient" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#3b82f6"/>
        <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
      </linearGradient>
    </defs>

    <!-- The curve -->
    <path d="M 80 216 C 130 216, 155 176, 180 172 C 205 168, 230 128, 280 124 C 330 120, 345 100, 380 96 C 415 92, 430 68, 480 60 C 530 52, 540 48, 568 46"
          fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Data points -->
    <circle cx="80" cy="216" r="6" fill="#0a0a0a" stroke="#3b82f6" stroke-width="2.5"/>
    <circle cx="180" cy="172" r="6" fill="#0a0a0a" stroke="#3b82f6" stroke-width="2.5"/>
    <circle cx="280" cy="124" r="6" fill="#0a0a0a" stroke="#3b82f6" stroke-width="2.5"/>
    <circle cx="380" cy="96" r="6" fill="#0a0a0a" stroke="#3b82f6" stroke-width="2.5"/>
    <circle cx="480" cy="60" r="6" fill="#0a0a0a" stroke="#3b82f6" stroke-width="2.5"/>
    <circle cx="568" cy="46" r="5" fill="#3b82f6" stroke="#3b82f6" stroke-width="2.5"/>

    <!-- Score labels -->
    <text x="80" y="204" text-anchor="middle" class="score-label">88</text>
    <text x="180" y="160" text-anchor="middle" class="score-label">91</text>
    <text x="280" y="112" text-anchor="middle" class="score-label">94</text>
    <text x="380" y="84" text-anchor="middle" class="score-label">95</text>
    <text x="480" y="48" text-anchor="middle" class="score-label">97</text>
    <text x="568" y="34" text-anchor="middle" class="score-label" fill="#3b82f6">99</text>

    <!-- Cycle labels -->
    <text x="80" y="280" text-anchor="middle" class="cycle-label">Audit</text>
    <text x="180" y="280" text-anchor="middle" class="cycle-label">Cycle 1</text>
    <text x="280" y="280" text-anchor="middle" class="cycle-label">Cycle 2</text>
    <text x="380" y="280" text-anchor="middle" class="cycle-label">Cycle 3</text>
    <text x="480" y="280" text-anchor="middle" class="cycle-label">Cycle 4</text>
    <text x="568" y="280" text-anchor="middle" class="cycle-label">Cycle 5</text>

    <!-- Annotations -->
    <text x="80" y="300" text-anchor="middle" class="axis-label" font-size="9">35 issues</text>
    <text x="80" y="310" text-anchor="middle" class="axis-label" font-size="9">found</text>

    <text x="568" y="300" text-anchor="middle" class="axis-label" font-size="9">15 fixed</text>
    <text x="568" y="310" text-anchor="middle" class="axis-label" font-size="9">3 regressions caught</text>
  </svg>
</div>
</body>
</html>
